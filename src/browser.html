<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integra</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ── Drag region overlay for window move ── -->
<div id="drag-region"></div>

<!-- ── Tab Bar ── -->
<div id="tabbar">
  <div id="tabs-list"></div>
  <button class="tab-new-btn" id="btn-new-tab" title="Новая вкладка (Ctrl+T)">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>
  <!-- Window controls (right side) -->
  <div id="win-controls">
    <button id="btn-min" class="wc-btn" title="Свернуть">
      <svg width="11" height="2" viewBox="0 0 11 2"><rect width="11" height="1.5" rx=".75" fill="currentColor"/></svg>
    </button>
    <button id="btn-max" class="wc-btn" title="Развернуть">
      <svg width="10" height="10" viewBox="0 0 10 10"><rect x=".75" y=".75" width="8.5" height="8.5" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
    </button>
    <button id="btn-close" class="wc-btn wc-close" title="Закрыть">
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<!-- ── Navigation Bar ── -->
<div id="navbar">
  <!-- Back / Forward / Reload -->
  <div class="nav-left">
    <button class="nav-btn" id="btn-back" title="Назад (Alt+←)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="nav-btn" id="btn-forward" title="Вперёд (Alt+→)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="nav-btn" id="btn-reload" title="Обновить (F5)">
      <svg id="ico-reload" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13.5 8a5.5 5.5 0 1 1-1.6-3.9L13.5 5.5V2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg id="ico-stop" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
        <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Address / Search bar -->
  <div class="nav-bar-wrap" id="urlbar-wrap">
    <div id="secure-icon" class="secure-icon hidden">
      <svg width="12" height="13" viewBox="0 0 12 13" fill="none">
        <rect x="1" y="5.5" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M3.5 5.5V4a2.5 2.5 0 0 1 5 0v1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <input type="text" id="urlbar" placeholder="Поиск или адрес сайта" autocomplete="off" spellcheck="false"/>
    <div id="urlbar-spinner" class="spinner hidden"></div>
  </div>

  <!-- Right controls -->
  <div class="nav-right">
    <!-- Bookmark star -->
    <button class="nav-btn bookmark-star-btn" id="btn-bookmark" title="Добавить в закладки (Ctrl+D)">
      <svg id="ico-star" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5l2.1 4.3 4.7.7-3.4 3.3.8 4.7L8 12.2 3.8 14.5l.8-4.7L1.2 6.5l4.7-.7L8 1.5z"
              stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/>
      </svg>
      <svg id="ico-star-filled" width="16" height="16" viewBox="0 0 16 16" fill="none" style="display:none">
        <path d="M8 1.5l2.1 4.3 4.7.7-3.4 3.3.8 4.7L8 12.2 3.8 14.5l.8-4.7L1.2 6.5l4.7-.7L8 1.5z"
              fill="currentColor" stroke="currentColor" stroke-width="1"/>
      </svg>
    </button>

    <!-- DPI Bypass toggle -->
    <button class="nav-btn bypass-btn" id="btn-bypass" title="Обход DPI/ТСПУ">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.25" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 4.5C6 4.5 4.5 6 4.5 8s1.5 3.5 3.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M8 4.5c2 0 3.5 1.5 3.5 3.5S10 11.5 8 11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-dasharray="2 1.5"/>
        <path d="M5.5 8h5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <path d="M8 5.5v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      <span id="bypass-label">Обход</span>
    </button>

    <!-- Settings button -->
    <button class="nav-btn" id="btn-settings" title="Настройки">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M6.5 1.5h3l.4 2 1.8 1 1.8-1 2.2 2.2-1 1.8 1 1.8-2 .4v3l-2 .4-1 1.8 1 1.8-2.2 2.2-1.8-1-1.8 1-2.2-2.2 1-1.8-1-1.8 2-.4v-3l2-.4 1-1.8-1-1.8 2.2-2.2 1.8 1 1.8-1z"
              stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"
              transform="translate(-1.5,-1.5)"/>
        <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none"/>
      </svg>
    </button>
  </div>
</div>

<!-- ── Bookmarks Bar ── -->
<div id="bookmarks-bar" class="hidden">
  <div id="bookmarks-list"></div>
  <button class="bm-more-btn" id="btn-bookmarks-panel" title="Все закладки">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <circle cx="3" cy="7" r="1.5" fill="currentColor"/>
      <circle cx="7" cy="7" r="1.5" fill="currentColor"/>
      <circle cx="11" cy="7" r="1.5" fill="currentColor"/>
    </svg>
  </button>
</div>

<!-- ── Bypass toast ── -->
<div id="bypass-toast" class="toast hidden"></div>

<!-- ── Context menu ── -->
<div id="ctx-menu" class="ctx-menu hidden">
  <button class="ctx-item" data-action="back">← Назад</button>
  <button class="ctx-item" data-action="forward">→ Вперёд</button>
  <button class="ctx-item" data-action="reload">↺ Обновить</button>
  <div class="ctx-sep"></div>
  <button class="ctx-item" data-action="new-tab">Новая вкладка</button>
  <button class="ctx-item" data-action="bookmark-toggle">★ Добавить в закладки</button>
  <button class="ctx-item" data-action="open-external">Открыть в браузере</button>
</div>

<!-- ── Settings Panel ── -->
<div id="settings-panel" class="panel hidden">
  <div class="panel-backdrop"></div>
  <div class="panel-container">
    <div class="panel-header">
      <h2 class="panel-title">Настройки</h2>
      <button class="panel-close" id="settings-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="panel-body">
      <!-- Search Engine -->
      <div class="settings-section">
        <div class="settings-section-title">Поисковая система</div>
        <div class="settings-row">
          <select id="setting-search-engine" class="settings-select">
            <option value="yandex">Яндекс</option>
            <option value="google">Google</option>
            <option value="duckduckgo">DuckDuckGo</option>
          </select>
        </div>
      </div>

      <!-- Theme -->
      <div class="settings-section">
        <div class="settings-section-title">Тема оформления</div>
        <div class="settings-row">
          <div class="settings-radio-group">
            <label class="settings-radio">
              <input type="radio" name="theme" value="dark" checked>
              <span class="settings-radio-mark"></span>
              <span>Тёмная</span>
            </label>
            <label class="settings-radio">
              <input type="radio" name="theme" value="system">
              <span class="settings-radio-mark"></span>
              <span>Системная</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Appearance -->
      <div class="settings-section">
        <div class="settings-section-title">Внешний вид</div>
        <div class="settings-row">
          <label class="settings-toggle">
            <span>Панель закладок</span>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-show-bookmarks" checked>
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>
        <div class="settings-row">
          <label class="settings-label">Размер шрифта: <span id="font-size-value">14px</span></label>
          <input type="range" id="setting-font-size" min="12" max="18" value="14" class="settings-range">
        </div>
      </div>

      <!-- Privacy -->
      <div class="settings-section">
        <div class="settings-section-title">Приватность</div>
        <div class="settings-row">
          <label class="settings-toggle">
            <span>Обход DPI при запуске</span>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-bypass-start">
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>
        <div class="settings-row">
          <label class="settings-toggle">
            <span>Очищать данные при выходе</span>
            <div class="toggle-switch">
              <input type="checkbox" id="setting-clear-exit">
              <span class="toggle-slider"></span>
            </div>
          </label>
        </div>
      </div>

      <!-- Data -->
      <div class="settings-section">
        <div class="settings-section-title">Данные</div>
        <div class="settings-row">
          <button class="settings-btn" id="btn-export-settings">Экспорт настроек</button>
          <button class="settings-btn" id="btn-import-settings">Импорт настроек</button>
        </div>
        <div class="settings-row">
          <button class="settings-btn settings-btn-danger" id="btn-reset-settings">Сбросить настройки</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Bookmarks Panel ── -->
<div id="bookmarks-panel" class="panel hidden">
  <div class="panel-backdrop"></div>
  <div class="panel-container panel-container-sm">
    <div class="panel-header">
      <h2 class="panel-title">Закладки</h2>
      <button class="panel-close" id="bookmarks-panel-close">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 2l10 10M12 2L2 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="bookmarks-search">
        <input type="text" id="bookmarks-search-input" placeholder="Поиск закладок..." autocomplete="off" spellcheck="false">
      </div>
      <div id="bookmarks-panel-list" class="bookmarks-panel-list">
        <!-- Bookmarks rendered here -->
      </div>
      <div id="bookmarks-empty" class="bookmarks-empty hidden">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <path d="M20 4l4.5 9 10 1.5-7.2 7 1.7 9.8L20 27.5 11 31.3l1.7-9.8-7.2-7 10-1.5L20 4z"
                stroke="currentColor" stroke-width="1.5" fill="none"/>
        </svg>
        <p>Закладок пока нет</p>
        <p class="text-muted">Нажмите ★ чтобы добавить</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Tab drag indicator ── -->
<div id="tab-drag-indicator" class="tab-drag-indicator hidden"></div>

<script src="js/renderer.js"></script>
</body>
</html>
